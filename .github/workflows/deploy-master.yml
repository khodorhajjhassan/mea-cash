name: Deploy Master

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-master-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT != '' && secrets.PROD_PORT || 22 }}
          command_timeout: 40m
          script_stop: true
          script: |
            set -e
            cd /var/www/mea-cash
            git fetch --prune origin
            git checkout master
            git pull --ff-only origin master
            chmod +x scripts/deploy-production.sh
            APP_DIR=/var/www/mea-cash BRANCH=master SKIP_GIT_PULL=true NODE_BUILD=true bash scripts/deploy-production.sh
